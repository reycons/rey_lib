# =============================================================================
# REY LIB — Configuration Reference
#
# rey_lib is a shared library. It has installation metadata but no app runtime
# config files of its own in the ccc installation tree.
# =============================================================================

# Config file names used by this app:
#   app.yaml


# =============================================================================
# FILE: app.yaml
# =============================================================================

name: rey_lib
# Required. Must be rey_lib.

enabled: true
# Options: true, false.

version: v01
# Informational version label.


# =============================================================================
# Shared config shapes supplied by rey_lib to apps
# =============================================================================

env:
  - name: openai_api_key
    env_var: OPENAI_API_KEY
    generate: false
# Optional environment declarations used by config tooling.
# generate options: true, false.

log_path: ~/logs/{app_name}/{app_name}.{operation}.{timestamp}.log
jsonl_path: ~/logs/{app_name}/{app_name}.{operation}.{timestamp}.jsonl
# Common log path tokens:
#   {operation}
#   {timestamp}
#   {app_name}
# JSONL logs are written by default through rey_lib.logs. If jsonl_path is
# omitted, setup_logging writes the authoritative JSONL beside log_path using
# the same stem and a .jsonl extension. Human-readable .log output is a
# configured readable view.

logging:
  jsonl_enabled: true
  readable_enabled: true
# jsonl_enabled may be set false only for explicitly configured exceptions.
# readable_enabled controls whether log_path produces a human-readable log.

jsonl_ctx_fields:
  - source_name
  - current_file
# Optional JSONL context fields.

state:
  file_operations_path: state/{config_root}/file_operations.jsonl
# Optional file-operation state JSONL path. This records files moved, created,
# copied, deleted, or otherwise managed by applications. Paths may be absolute
# or relative to the installation root.
# Deprecated compatibility key: file_movements_path.
# Supported tokens:
#   {config_root}       active config root folder name, e.g. v01
#   {config_root_name}  alias for {config_root}
#   {installation}      installation name when available

messaging:
  archive_path: ~/Rey Apps/test/state/v01/messages.jsonl
  text_max_length: 160
  delivery:
    dry_run: true
  pipeline_summary:
    audience: internal
    record_limit: 500
    subject: "Pipeline $pipeline_name: $pipeline_status"
    body: |
      # Pipeline $pipeline_name

      Status: $pipeline_status
      Run ID: $run_id
      Batch ID: $batch_id
      Log file: $log_file

      $overall_summary

      ## Errors
      $error_summary

      ## Warnings
      $warning_summary

      Failed steps: $failed_steps
  approvals:
    required_audiences:
      - external
    required_message_types: []
    required_channels: []
  recipient_groups:
    - name: internal_ops
      description: Internal operations notifications.
      email:
        to:
          - ops@example.com
          - support@example.com
        cc: []
        bcc: []
        reply_to: ""
      phone:
        to: []
      slack:
        channels: []
        users: []
  providers:
    email:
      provider: smtp
      host: smtp.example.com
      port: 587
      from_address: no-reply@example.com
      starttls: true
      username: ""
      password: ""
      timeout_seconds: 30
# Optional shared messaging configuration. Applications submit message
# requests through rey_lib.messaging and must not directly send email, text,
# webhook, or external notifications.
# archive_path is optional file-backed JSONL persistence for message snapshots
# and lifecycle events. JSONL logs remain the authoritative audit trail.
# delivery.dry_run allows beta pipeline messaging to exercise the full
# lifecycle without contacting a provider.
# pipeline_summary controls the deterministic log-to-message template used
# by rey_messaging finalizer steps.
# approvals are deterministic policy controls; LLM generation may draft content
# but never recipients, provider routing, timing, or approval requirements.
# recipient_groups are deterministic, channel-shaped delivery targets. Apps pass
# recipient_group + channel; rey_lib.messaging resolves to email.to/cc/bcc,
# phone.to, or slack channels/users.
# v1 channels:
#   email   — dry-run and SMTP provider
#   text    — dry-run only; provider dispatch reserved
#   webhook — dry-run only; provider dispatch reserved

diagnostics:
  info:
    enabled: true
    dump_ctx: false
  warning:
    enabled: true
    dump_ctx: true
  error:
    enabled: true
    dump_ctx: true
    dump_stack_trace: true
# Diagnostics options:
#   enabled: true | false
#   dump_ctx: true | false
#   dump_stack_trace: true | false
#   dump_sql: true | false
#   dump_rows_on_error: integer
#   ctx_fields: list of ctx dotted paths
